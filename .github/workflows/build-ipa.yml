name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor + TypeScript
        run: npm install -g @capacitor/cli ts-node typescript

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build IPA (unsigned)
        run: |
          cd ios/App
          xcodebuild \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive
          mkdir -p $RUNNER_TEMP/ipa
          cd $RUNNER_TEMP/App.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r *.app Payload/
          zip -r $RUNNER_TEMP/ipa/DailyAlphaAI.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyAlphaAI-iOS
          path: ${{ runner.temp }}/ipa/DailyAlphaAI.ipa
          retention-days: 30
